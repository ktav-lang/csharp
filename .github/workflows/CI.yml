name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "true"

jobs:
  test:
    name: ${{ matrix.os }} / .NET ${{ matrix.dotnet }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        dotnet: ["8.0.x"]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet }}

      - name: Build native library
        run: cargo build --release -p ktav-cabi

      - name: Export KTAV_LIB_PATH (Linux)
        if: runner.os == 'Linux'
        run: echo "KTAV_LIB_PATH=${{ github.workspace }}/target/release/libktav_cabi.so" >> $GITHUB_ENV
      - name: Export KTAV_LIB_PATH (macOS)
        if: runner.os == 'macOS'
        run: echo "KTAV_LIB_PATH=${{ github.workspace }}/target/release/libktav_cabi.dylib" >> $GITHUB_ENV
      - name: Export KTAV_LIB_PATH (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: echo "KTAV_LIB_PATH=${{ github.workspace }}/target/release/ktav_cabi.dll" >> $GITHUB_ENV

      - name: dotnet test
        env:
          KTAV_SPEC_ROOT: ${{ github.workspace }}/spec/versions/0.1/tests
        run: dotnet test tests/Ktav.Tests/Ktav.Tests.csproj -c Release --logger "console;verbosity=normal"

  lint-rust:
    name: rust clippy + fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --release -p ktav-cabi -- -D warnings

  build-pack:
    name: dotnet pack (no native)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - run: dotnet pack src/Ktav/Ktav.csproj -c Release -o pkg
      - uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: pkg/*.nupkg
          retention-days: 7
